name: Deploy nodejs-student-service

env:
  APP_NAME: "nodejs-student-service"
  APP_DIR: "/var/www/nodejs-student-service"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: Test ───────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_ENV: production
      SERVER_PORT: 3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Clear npm cache
        run: npm cache clean --force

      # - name: Install dependencies
      #   run: npm ci

      # # - name: Run tests
      # #   run: npm test

      # - name: Build app
      #   run: npm run build

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          timeout: 60s
          script: |
            APP_DIR=/var/www/nodejs-student-service
            APP_NAME=nodejs-student-service

            # ── 1. Safety checks ──────────────────────────────────────
            if [ -z "$APP_DIR" ]; then
              echo "ERROR: APP_DIR is empty, aborting!"
              exit 1
            fi

            DEPTH=$(echo "$APP_DIR" | tr -cd '/' | wc -c)
            if [ "$DEPTH" -lt 3 ]; then
              echo "ERROR: APP_DIR '$APP_DIR' is too shallow, aborting!"
              exit 1
            fi

            BLOCKED="/ /var /var/www /home /etc /usr /bin /sbin"
            for BLOCKED_PATH in $BLOCKED; do
              if [ "$APP_DIR" = "$BLOCKED_PATH" ]; then
                echo "ERROR: APP_DIR '$APP_DIR' is a protected path, aborting!"
                exit 1
              fi
            done

            echo "✅ Safety checks passed for $APP_DIR"

            # ── 2. Set environment variables ──────────────────────────
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export NODE_ENV="production"
            export SERVER_PORT="3000"
            echo "✅ Environment variables set"

            # ── 2. Safety checks ──────────────────────────────────────
            # Install Node.js 18
            echo "Installing Node.js and Git..."
            sudo dnf install -y nodejs git
            node -v && npm -v && git --version
            echo "✅ Node.js and Git installed"

            # ── 3. Safe remove ────────────────────────────────────────
            if [ -d "$APP_DIR" ]; then
              echo "Directory exists — removing safely..."
              sudo chown -R $USER:$USER "$APP_DIR"
              sudo rm -rf "$APP_DIR"
              echo "✅ Removed $APP_DIR"
              sudo mkdir -p "$APP_DIR"
              sudo chown -R $USER:$USER "$APP_DIR"
              echo "✅ Recreated $APP_DIR"
            else
              echo "Directory does not exist — creating..."
              sudo mkdir -p "$APP_DIR"
              sudo chown -R $USER:$USER "$APP_DIR"
              echo "✅ Created $APP_DIR"
            fi

            # ── 4. Clone or pull latest code ──────────────────────────
            echo "Cloning repository..."
            sudo git clone https://${{ secrets.G_HUB_USERNAME }}:${{ secrets.G_HUB_TOKEN }}@github.com/${{ secrets.G_HUB_USERNAME }}/${{ secrets.G_HUB_REPOSITORY }}.git "$APP_DIR"
            echo "✅ Clone complete"

            # ── 6. Create .env file ───────────────────────────────────
            echo "Creating .env file..."
            cat > "$APP_DIR/.env" <<EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NODE_ENV=production
            SERVER_PORT=3000
            EOF
            echo "✅ .env file created"

            # ── 4. Install dependencies ───────────────────────────────
            echo "Installing dependencies..."
            cd "$APP_DIR"
            npm ci
            sudo npm install -g typescript  
            npx tsc --project tsconfig.json 2>&1
            echo "✅ Dependencies installed"

            # ── 6. Build on EC2 ───────────────────────────────────────
            echo "Building the application.."
            npm run build
            echo "✅ Build complete"

            # ── 6. List Build output files ───────────────────────────────────────
            echo "📁 Listing build output..."
            if [ ! -d "$APP_DIR/dist" ]; then
              echo "ERROR: dist folder not found after build, aborting!"
              exit 1
            fi
            find "$APP_DIR/dist" -print

            # ── 8. Prune devDependencies after build ──────────────────
            echo "Pruning devDependencies..."
            sudo npm prune --omit=dev    
            echo "✅ Pruned devDependencies"

            # Migrate all new SQl schema changes - using drizzle-kit push
            echo "Migrating database schema changes..."
            npx drizzle-kit push
            echo "✅ Database migration completed"

            # ── 4. Restart app with PM2 ───────────────────────────────
            pm2 describe $APP_NAME > /dev/null 2>&1 \
              && pm2 restart $APP_NAME \
              || pm2 start npm --name "$APP_NAME" -- start

            pm2 save

            echo "✅ Deployment successful!"
