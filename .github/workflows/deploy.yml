name: Deploy nodejs-student-service

env:
  APP_DIR_NAME: "/nodejs-student-service"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── JOB 1: Test ───────────────────────────────────────
  test:
    name: Clean install, Run Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
        
      - name: Clear npm cache
        run: npm cache clean --force
        
      - name: Install dependencies
        run: npm ci

      # - name: Run tests
      #   run: npm test

      - name: Build app
        run: npm run build

  # ─── JOB 2: Deploy (only on push to main) ──────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test # Only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            echo "Installing Node.js..."
            # Remove any existing Node.js versions
            sudo dnf remove -y nodejs
            
            # Install Node.js 18
            sudo dnf install -y nodejs

            # Verify
            node -v && npm -v

            # Ensure the directory exists and is owned by your user
            sudo mkdir -p /var/www/${{env.APP_DIR_NAME}}
            sudo chown -R $USER:$USER /var/www
            sudo chown -R $USER:$USER /var/www/${{env.APP_DIR_NAME}}

            cd /var/www/${{env.APP_DIR_NAME}}

            # Pull latest code
            git pull origin main

            # Install dependencies (production only)
            npm ci --omit=dev

            # Run DB migrations if applicable
            # npm run migrate

            # Migrate all new SQl schema changes - using drizzle-kit push
            npm run db:push

            # Restart app with zero downtime
            pm2 reload nodejs-student-service --update-env || pm2 start dist/index.js --name nodejs-student-service

            # Save PM2 process list
            pm2 save

            echo "✅ Deployment successful!"
